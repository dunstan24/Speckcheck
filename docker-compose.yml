services:

  # ── 1. DATABASE ──────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: speccheck_db
    restart: unless-stopped
    command: --performance_schema=OFF --innodb_buffer_pool_size=128M --max_connections=50
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-R00t@M4sT3r#2026!zX9wLpN}
      MYSQL_DATABASE: ${DB_NAME:-speccheck}
      MYSQL_USER: ${DB_USER:-speccheck}
      MYSQL_PASSWORD: ${DB_PASSWORD:-Sp3cCh3ck@Db#2026!xK9mPqR7}
    # Port 3306 TIDAK di-expose ke publik (hanya bisa diakses oleh backend container)
    # Uncomment baris ini HANYA jika kamu perlu koneksi dari luar Docker (misal: MySQL Workbench)
    # ports:
    #   - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql                              # data MySQL tersimpan permanen
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql  # seed data otomatis
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "speccheck", "--password=Sp3cCh3ck@Db#2026!xK9mPqR7"]
      interval: 10s
      timeout: 5s
      retries: 10
      # NOTE: healthcheck password above must match DB_PASSWORD in backend/.env

  # ── 2. BACKEND (Flask) ────────────────────────────────────────
  backend:
    build: ./backend
    container_name: speccheck_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-speccheck}
      - DB_PASSWORD=${DB_PASSWORD:-Sp3cCh3ck@Db#2026!xK9mPqR7}
      - DB_NAME=${DB_NAME:-speccheck}
      - FRONTEND_URL=https://bisamainnggak.com
      - GOOGLE_CLIENT_ID=1056267161459-k6j40ujc155euhhbi2hh7clvri1rvem.apps.googleusercontent.com
    env_file:
      - path: ./backend/.env
        required: false
    depends_on:
      db:
        condition: service_healthy   # tunggu MySQL benar-benar siap
    volumes:
      - ./backend:/app               # hot-reload: edit app.py langsung terbaca
      - ./detector:/detector         # agar file detector bisa di-download via Docker
      - ./data:/data                 # agar data CSV pcgamingwiki terbaca oleh backend
      - ./frontend/src/data:/frontend_data # mount frontend data dir untuk analysis output


  # ── 3. FRONTEND (Vite + React) ────────────────────────────────
  frontend:
    build: ./frontend
    container_name: speccheck_frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=https://api.bisamainnggak.com
      - VITE_GOOGLE_CLIENT_ID=1056267161459-k6j40ujc155euhhbi2hh7clvri1rvem.apps.googleusercontent.com
    command: sh -c "chmod -R +x /app/node_modules/.bin 2>/dev/null; npx vite --host 0.0.0.0 --port 5173"
    ports:
      - "80:5173"
    volumes:
      - ./frontend:/app              # hot-reload: edit src/ langsung terbaca
      - /app/node_modules            # jangan timpa node_modules container
    depends_on:
      - backend

# Volume permanen untuk data MySQL
volumes:
  db_data:
